<!DOCTYPE html>
<html lang="it">
<head>a
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3d5a80">
  <title>gioco classe</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #2c4770;
      color: #fff;
      overflow-x: hidden;
    }

    .shell {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100%;
      padding: 12px 12px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .brand { text-align: center; }
    .brand h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
    }
    .brand p {
      margin: 6px 0 0;
      font-size: 0.88rem;
      color: #e0e0e0;
      line-height: 1.4;
    }

    .panel {
      background: #2c4770;
      border: 2px solid #1a2f4d;
      border-radius: 8px;
      padding: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .hud span { color: #fff; }
    .pill {
      background: #1a2f4d;
      border-radius: 6px;
      padding: 6px 8px;
      border: 1px solid #4a6fa5;
    }
    .combo {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 0.8rem;
      color: #ffeb3b;
      min-height: 1.2em;
    }

    #gameWrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid #1a2f4d;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
    }

    .touchZones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    .touchZones button {
      padding: 12px;
      border-radius: 6px;
      border: 2px solid #1a2f4d;
      font-family: inherit;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
      color: #000;
    }
    #btnLeft { background: #90caf9; }
    #btnRight { background: #f48fb1; }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .btn {
      flex: 1 1 auto;
      min-width: 120px;
      padding: 10px 12px;
      border-radius: 6px;
      border: 2px solid #1a2f4d;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      color: #000;
    }
    .btn-primary { background: #ffeb3b; }
    .btn-ghost {
      background: #78909c;
      color: #fff;
      border: 2px solid #546e7a;
    }
    .btn-danger {
      background: #e57373;
      color: #000;
      border: 2px solid #c62828;
      font-size: 0.85rem;
      padding: 8px 10px;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint {
      font-size: 0.8rem;
      color: #e0e0e0;
      text-align: center;
      line-height: 1.4;
    }
    kbd {
      font-family: Consolas, monospace;
      background: #1a2f4d;
      padding: 2px 5px;
      border-radius: 4px;
      border: 1px solid #4a6fa5;
      font-size: 0.75em;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      padding: 16px;
      text-align: center;
    }
    #overlay.hidden { display: none; }
    .hidden { display: none !important; }
    .card-in {
      max-width: 320px;
      width: 100%;
    }
    .card-in h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }
    .card-in input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 2px solid #1a2f4d;
      background: #fff;
      color: #000;
      font-size: 1rem;
      margin-bottom: 8px;
      outline: none;
    }
    .card-in input:focus { border-color: #1976d2; }
    .finalScore {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ffeb3b;
      margin: 8px 0 10px;
    }
    .lb {
      margin-top: 10px;
      text-align: left;
      font-size: 0.82rem;
      max-height: 140px;
      overflow-y: auto;
    }
    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      background: #2c4770;
      border: 1px solid #4a6fa5;
    }
    .lb-row:nth-child(1) { background: #4a6fa5; }
    #toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
      border: 2px solid #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 50;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <h1>Leggenda della Classe</h1>
      <p>Schiva 3, 4 e 5 e le verifiche: più veloce vai, più ne arrivano.</p>
    </div>

    <div class="panel">
      <div class="hud">
        <div class="pill">Punti <span id="scoreVal">0</span></div>
        <div class="pill">Record <span id="bestVal">0</span></div>
        <div class="pill">Vite <span id="livesVal">3</span></div>
        <div class="pill">Velocità <span id="speedVal">1</span>x</div>
        <div class="combo" id="comboText"></div>
      </div>
    </div>

    <div id="gameWrap">
      <canvas id="c" width="400" height="640"></canvas>
      <div id="overlay">
        <div class="card-in" id="startScreen">
          <h2>Nome</h2>
          <input id="nick" maxlength="16" placeholder="Il tuo nome" autocomplete="off">
          <button class="btn btn-primary" id="playBtn" style="width:100%">Gioca</button>
          <p class="hint" style="margin-top:10px">Tasti: <kbd>A</kbd> <kbd>D</kbd> o frecce</p>
        </div>
        <div class="card-in hidden" id="gameOverScreen">
          <h2>Game over</h2>
          <div class="finalScore" id="finalScore">0</div>
          <div class="row">
            <button class="btn btn-primary" id="againBtn">Riprova</button>
            <button class="btn btn-ghost" id="shareBtn">Copia sfida</button>
          </div>
          <div class="lb" id="leaderboard"></div>
        </div>
      </div>
    </div>

    <div class="touchZones">
      <button type="button" id="btnLeft">← Sinistra</button>
      <button type="button" id="btnRight">Destra →</button>
    </div>

    <div class="row">
      <button class="btn btn-ghost" id="pauseBtn" disabled>Pausa</button>
      <button type="button" class="btn btn-danger" id="resetLbBtn">Azzera classifica</button>
    </div>

    <p class="hint">
      Voti verdi = bene. Voti rossi (3, 4, 5) e verifiche = male. Combo = tanti voti buoni di fila.
    </p>
  </div>

  <div id="toast"></div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const LANES = 3;
    const LANE_W = W / LANES;

    const el = {
      score: document.getElementById("scoreVal"),
      best: document.getElementById("bestVal"),
      lives: document.getElementById("livesVal"),
      speed: document.getElementById("speedVal"),
      combo: document.getElementById("comboText"),
      overlay: document.getElementById("overlay"),
      startScreen: document.getElementById("startScreen"),
      gameOverScreen: document.getElementById("gameOverScreen"),
      finalScore: document.getElementById("finalScore"),
      nick: document.getElementById("nick"),
      leaderboard: document.getElementById("leaderboard"),
      toast: document.getElementById("toast")
    };

    const LB_KEY = "leggenda_classe_lb_v1";

    let nick = "Player";
    let running = false;
    let paused = false;

    let score = 0;
    let best = Number(localStorage.getItem("leggenda_classe_best") || "0");
    let lives = 3;
    let combo = 0;
    let maxCombo = 0;

    let lane = 1;
    let baseSpeed = 3.2;
    let speedMul = 1;
    let spawnTimer = 0;
    let spawnEvery = 36;

    let items = [];
    let particles = [];
    let shake = 0;
    let flash = 0;

    let audioCtx = null;

    function beep(freq, dur, type = "sine", vol = 0.08) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.value = freq;
        g.gain.value = vol;
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + dur);
      } catch (_) {}
    }

    function toast(msg) {
      el.toast.textContent = msg;
      el.toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.toast.classList.remove("show"), 2200);
    }

    function loadBoard() {
      try {
        return JSON.parse(localStorage.getItem(LB_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveBoard(rows) {
      localStorage.setItem(LB_KEY, JSON.stringify(rows.slice(0, 10)));
    }

    function pushScore(name, pts, mCombo) {
      const rows = loadBoard();
      rows.push({ name: String(name || "Player").slice(0, 16), score: pts, combo: mCombo, t: Date.now() });
      rows.sort((a, b) => b.score - a.score);
      saveBoard(rows);
      return rows;
    }

    function renderLeaderboard(rows) {
      el.leaderboard.innerHTML = rows.slice(0, 8).map((r, i) =>
        `<div class="lb-row"><span>${i + 1}. ${escapeHtml(r.name)}</span><span>${r.score} pt</span></div>`
      ).join("") || "<div class='hint'>Nessun record ancora.</div>";
    }

    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function laneCenter(l) {
      return (l + 0.5) * LANE_W;
    }

    function resetGame() {
      score = 0;
      lives = 3;
      combo = 0;
      maxCombo = 0;
      lane = 1;
      baseSpeed = 3.2;
      speedMul = 1;
      spawnTimer = 0;
      spawnEvery = 36;
      items = [];
      particles = [];
      shake = 0;
      flash = 0;
    }

    function hud() {
      el.score.textContent = String(Math.floor(score));
      el.best.textContent = String(Math.floor(best));
      el.lives.textContent = String(lives);
      el.speed.textContent = speedMul.toFixed(2);
      if (combo >= 2) {
        el.combo.textContent = "Combo x" + combo;
      } else {
        el.combo.textContent = "";
      }
    }

    function pickBadGrade(sm) {
      const t = Math.min(1, (sm - 1) / 1.6);
      const r = Math.random();
      if (t < 0.35) {
        if (r < 0.72) return 4;
        if (r < 0.9) return 5;
        return 3;
      }
      if (t < 0.7) {
        if (r < 0.38) return 4;
        if (r < 0.72) return 5;
        return 3;
      }
      if (r < 0.2) return 4;
      if (r < 0.55) return 5;
      return 3;
    }

    function spawnItem() {
      const l = Math.floor(Math.random() * LANES);
      const t = Math.min(1, (speedMul - 1) / 1.6);
      const pGood = 0.38 - t * 0.1;
      const pBad = 0.33 + t * 0.14;
      const roll = Math.random();
      let kind;
      let grade = 10;
      let badGrade = 4;
      let subject = "matematica";

      if (roll < pGood) {
        kind = "good";
        const grades = [10, 10, 9, 9, 8];
        grade = grades[Math.floor(Math.random() * grades.length)];
      } else if (roll < pGood + pBad) {
        kind = "badVote";
        badGrade = pickBadGrade(speedMul);
      } else {
        kind = "verifica";
        subject = Math.random() < 0.5 ? "matematica" : "italiano";
      }
      items.push({
        lane: l,
        y: -45,
        kind,
        grade,
        badGrade,
        subject,
        r: kind === "verifica" ? 26 : 20,
        hit: false
      });
    }

    function burst(x, y, col) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 1.5 + Math.random() * 3.5;
        particles.push({
          x, y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 1,
          life: 1,
          col
        });
      }
    }

    function update() {
      if (!running || paused) return;

      score += 0.35 * (1 + combo * 0.08) * speedMul;
      speedMul = Math.min(2.6, 1 + score / 2200);

      const vy = baseSpeed * speedMul;
      spawnTimer += 1;
      if (spawnTimer >= spawnEvery) {
        spawnTimer = 0;
        spawnEvery = Math.max(10, 36 - Math.floor(score / 200));
        spawnItem();
        if (Math.random() < 0.38) {
          spawnItem();
        }
      }

      const py = H - 120;
      const px = laneCenter(lane);

      for (const it of items) {
        it.y += vy;
        if (it.hit) continue;

        const ix = laneCenter(it.lane);
        const dy = Math.abs(it.y - py);
        const dx = Math.abs(ix - px);
        if (dy < 34 && dx < LANE_W * 0.38) {
          it.hit = true;
          if (it.kind === "good") {
            const bonus = 12 + combo * 4 + (it.grade === 10 ? 3 : 0);
            score += bonus;
            combo += 1;
            maxCombo = Math.max(maxCombo, combo);
            burst(ix, it.y, "#4ade80");
            beep(520 + combo * 30, 0.06, "square", 0.06);
          } else {
            combo = 0;
            lives -= 1;
            shake = 12;
            flash = 0.35;
            beep(120, 0.12, "sawtooth", 0.07);
            if (lives <= 0) {
              endGame();
              return;
            }
          }
        }
      }

      items = items.filter((it) => it.y < H + 60 && !it.hit);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.12;
        p.life -= 0.035;
      }
      particles = particles.filter((p) => p.life > 0);

      if (shake > 0) shake *= 0.88;
      if (flash > 0) flash *= 0.9;

      if (score > best) {
        best = score;
        localStorage.setItem("leggenda_classe_best", String(Math.floor(best)));
      }
      hud();
    }

    function drawBg() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#1e3a5f");
      g.addColorStop(0.45, "#1e293b");
      g.addColorStop(1, "#0f172a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(148, 163, 184, 0.12)";
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 28) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(148, 163, 184, 0.2)";
      for (let i = 1; i < LANES; i++) {
        const x = i * LANE_W;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }

      ctx.fillStyle = "rgba(255,255,255,0.04)";
      ctx.fillRect(12, 0, 4, H);
    }

    function drawItems() {
      for (const it of items) {
        if (it.hit) continue;
        const x = laneCenter(it.lane);
        const y = it.y;
        ctx.save();
        ctx.translate(x, y);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if (it.kind === "good") {
          const rr = it.r;
          ctx.fillStyle = "#15803d";
          ctx.shadowColor = "#4ade80";
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(0, 0, rr, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#86efac";
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.fillStyle = "#ecfdf5";
          ctx.font = "bold 22px Arial,sans-serif";
          ctx.fillText(String(it.grade), 0, 1);
        } else if (it.kind === "verifica") {
          const isMat = it.subject === "matematica";
          const accent = isMat ? "#1d4ed8" : "#166534";
          const border = isMat ? "#3b82f6" : "#22c55e";
          const w = it.r * 2.35;
          const h = it.r * 1.9;
          ctx.shadowColor = "rgba(0,0,0,0.4)";
          ctx.shadowBlur = 10;
          ctx.shadowOffsetX = 3;
          ctx.shadowOffsetY = 4;
          ctx.fillStyle = "#fffbeb";
          ctx.strokeStyle = border;
          ctx.lineWidth = 2;
          ctx.fillRect(-w / 2, -h / 2, w, h);
          ctx.strokeRect(-w / 2, -h / 2, w, h);
          ctx.shadowBlur = 0;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 0;
          ctx.fillStyle = "#fde68a";
          ctx.beginPath();
          ctx.moveTo(w / 2 - 20, -h / 2);
          ctx.lineTo(w / 2, -h / 2);
          ctx.lineTo(w / 2, -h / 2 + 20);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "#ca8a04";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = accent;
          ctx.fillRect(-w / 2 + 4, -h / 2 + 5, w - 8, 20);
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 11px Arial,sans-serif";
          ctx.fillText("VERIFICA", 0, -h / 2 + 15);
          ctx.strokeStyle = "#d6d3d1";
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            const ly = -h / 2 + 34 + i * 11;
            ctx.beginPath();
            ctx.moveTo(-w / 2 + 10, ly);
            ctx.lineTo(w / 2 - 10, ly);
            ctx.stroke();
          }
          ctx.fillStyle = "#57534e";
          ctx.font = "9px Arial,sans-serif";
          ctx.fillText(isMat ? "Esercizi + problemi" : "Comprensione + grammatica", 0, -h / 2 + 31);
          ctx.fillStyle = "#fafaf9";
          ctx.strokeStyle = accent;
          ctx.lineWidth = 2;
          ctx.fillRect(-w / 2 + 7, h / 2 - 26, w - 14, 20);
          ctx.strokeRect(-w / 2 + 7, h / 2 - 26, w - 14, 20);
          ctx.fillStyle = accent;
          ctx.font = "bold 12px Arial,sans-serif";
          ctx.fillText(isMat ? "Matematica" : "Italiano", 0, h / 2 - 14);
        } else if (it.kind === "badVote") {
          const g = it.badGrade;
          let fill = "#b91c1c";
          let stroke = "#fecaca";
          if (g === 3) {
            fill = "#7f1d1d";
            stroke = "#fca5a5";
          } else if (g === 5) {
            fill = "#c2410c";
            stroke = "#fdba74";
          }
          ctx.fillStyle = fill;
          ctx.shadowColor = stroke;
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(0, 0, it.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = stroke;
          ctx.lineWidth = 3;
          ctx.stroke();
          ctx.fillStyle = "#fff7ed";
          ctx.font = "bold 24px Arial,sans-serif";
          ctx.fillText(String(g), 0, 2);
        }
        ctx.restore();
      }
    }

    function drawPlayer() {
      const x = laneCenter(lane);
      const y = H - 120;
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = "#38bdf8";
      ctx.shadowColor = "#0ea5e9";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#0f172a";
      ctx.beginPath();
      ctx.arc(-7, -4, 4, 0, Math.PI * 2);
      ctx.arc(7, -4, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fbbf24";
      ctx.font = "bold 11px Arial,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("TU", 0, 38);
      ctx.restore();
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.col;
        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
      }
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.save();
      if (shake > 0.5) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }
      drawBg();
      drawItems();
      drawPlayer();
      drawParticles();

      if (flash > 0.05) {
        ctx.fillStyle = `rgba(248, 113, 113, ${flash * 0.5})`;
        ctx.fillRect(0, 0, W, H);
      }

      ctx.fillStyle = "rgba(15, 23, 42, 0.45)";
      ctx.fillRect(0, H - 56, W, 56);
      ctx.fillStyle = "rgba(226, 232, 240, 0.5)";
      ctx.font = "bold 12px Arial,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Schiva 3, 4, 5 e le verifiche — prendi 10, 9 e 8!", W / 2, H - 22);

      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function showOverlay(which) {
      el.overlay.classList.remove("hidden");
      el.startScreen.classList.add("hidden");
      el.gameOverScreen.classList.add("hidden");
      if (which === "start") {
        el.startScreen.classList.remove("hidden");
      } else {
        el.gameOverScreen.classList.remove("hidden");
      }
    }

    function hideOverlay() {
      el.overlay.classList.add("hidden");
    }

    function startGame() {
      nick = el.nick.value.trim() || "Player";
      resetGame();
      running = true;
      paused = false;
      hideOverlay();
      document.getElementById("pauseBtn").disabled = false;
      hud();
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      } catch (_) {}
      beep(330, 0.08, "triangle", 0.07);
    }

    function endGame() {
      running = false;
      const final = Math.floor(score);
      el.finalScore.textContent = String(final);
      const rows = pushScore(nick, final, maxCombo);
      renderLeaderboard(rows);
      showOverlay("over");
      document.getElementById("pauseBtn").disabled = true;
      beep(180, 0.2, "sawtooth", 0.06);
    }

    function move(dir) {
      if (!running || paused) return;
      lane = Math.max(0, Math.min(LANES - 1, lane + dir));
      beep(240, 0.04, "sine", 0.04);
    }

    function shareText() {
      const final = Math.floor(score);
      return `Leggenda della Classe: ${final} punti (combo max ${maxCombo}). La batti?`;
    }

    document.getElementById("playBtn").addEventListener("click", startGame);
    document.getElementById("againBtn").addEventListener("click", () => {
      showOverlay("start");
    });
    document.getElementById("shareBtn").addEventListener("click", async () => {
      const text = shareText();
      try {
        await navigator.clipboard.writeText(text);
        toast("Copiato negli appunti.");
      } catch {
        prompt("Copia questo testo:", text);
      }
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      if (!running) return;
      paused = !paused;
      document.getElementById("pauseBtn").textContent = paused ? "Riprendi" : "Pausa";
    });

    document.getElementById("resetLbBtn").addEventListener("click", () => {
      if (!confirm("Cancellare tutta la classifica salvata?")) return;
      localStorage.removeItem(LB_KEY);
      renderLeaderboard(loadBoard());
      toast("Classifica azzerata.");
    });

    document.getElementById("btnLeft").addEventListener("click", () => move(-1));
    document.getElementById("btnRight").addEventListener("click", () => move(1));

    document.addEventListener("keydown", (e) => {
      if (e.key === "a" || e.key === "A" || e.key === "ArrowLeft") move(-1);
      if (e.key === "d" || e.key === "D" || e.key === "ArrowRight") move(1);
    });

    canvas.addEventListener("pointerdown", (e) => {
      if (!running || paused) return;
      const r = canvas.getBoundingClientRect();
      const x = e.clientX - r.left;
      if (x < r.width / 2) move(-1);
      else move(1);
    });

    el.best.textContent = String(Math.floor(best));
    renderLeaderboard(loadBoard());
    loop();
  </script>
</body>
